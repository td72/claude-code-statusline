# claude-code-statusline default configuration
#
# Each [[line]] defines a row in the status line output.
# Widgets are rendered in order and joined by the separator.
# Widgets that return nothing (e.g., agent when not active) are skipped.

# Line 1: Where am I?
[[line]]
widgets = ["vim", "workspace", "git_branch", "worktree"]
separator = ""

# Line 2: Model + context
[[line]]
widgets = ["model", "context_usage"]
separator = " "

# Line 3: Session summary
[[line]]
widgets = ["cost_summary"]
separator = " | "

# Line 4: Rate limits
[[line]]
widgets = ["rate_limit_5h", "rate_limit_7d"]
separator = "   "

# Widget configurations

# lualine theme: normal=#80d8ff, insert=#c3e88d, fg=#263238
[widget.vim]
normal_bg = "117"   # #87d7ff ≈ #80d8ff
normal_fg = "236"   # #303030 ≈ #263238
insert_bg = "150"   # #afd787 ≈ #c3e88d
insert_fg = "236"

# lualine section b: fg=#eeffff bg=#515559
[widget.workspace]
prefix = "📁 "
style = "basename"
color = "255"
bg = "240"

# lualine section c: fg=#eeffff bg=#2E3C43
[widget.git_branch]
prefix = " "
color = "255"
bg = "237"    # #3a3a3a ≈ #2E3C43

[widget.worktree]
prefix = "🌲 "
color = "255"
bg = "237"

[widget.model]
prefix = "🤖 "
short = true
color = "255"

[widget.context_usage]
bar_width = 10
filled_char = "█"
empty_char = "░"
show_label = true
show_tokens = true
token_style = "compact"

[widget.context_usage.thresholds]
red = 90
yellow = 70

[widget.token_alert]
on_text = "⚠"
on_color = "red"

[widget.cost_summary]
show_lines = true
cost_prefix = "💰 "
duration_prefix = "⏱ "
lines_prefix = "📝 "

[widget.rate_limit_5h]
window = "5h"
bar_width = 5
prefix = "🕐 "
reset_separator = " ↻"

[widget.rate_limit_5h.thresholds]
red = 90
yellow = 70

[widget.rate_limit_7d]
window = "7d"
bar_width = 5
prefix = "📅 "
reset_separator = " ↻"

[widget.rate_limit_7d.thresholds]
red = 90
yellow = 70
